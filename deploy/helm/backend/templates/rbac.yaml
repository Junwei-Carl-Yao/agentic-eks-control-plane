# Kubernetes RBAC for the backend ServiceAccount. IRSA grants AWS API
# permissions; this ClusterRole grants Kubernetes apiserver permissions.
# Both are required — without this binding, every client-go call from the
# pod returns 403 from the apiserver, regardless of the IRSA role.
#
# Scope is cluster-wide because list_nodes and list_namespaces target
# cluster-scoped resources. Per-namespace mutation safety is enforced by
# the guardrail policy (AllowedNamespaces in backend/internal/guardrails),
# not by RBAC binding scope.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eks-control-plane-backend
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "events", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["update"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - nonResourceURLs: ["/livez"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eks-control-plane-backend
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: eks-control-plane-backend
  apiGroup: rbac.authorization.k8s.io
