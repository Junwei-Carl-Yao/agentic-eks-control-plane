apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
  annotations:
    eks.amazonaws.com/role-arn: {{ required "serviceAccount.roleArn is required (Terraform output irsa_backend_role_arn)" .Values.serviceAccount.roleArn | quote }}
