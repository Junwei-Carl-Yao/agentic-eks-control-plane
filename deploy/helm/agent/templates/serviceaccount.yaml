# The agent ServiceAccount has no IRSA annotation — the runtime never talks
# to AWS directly. Its only outbound calls are to the backend Service (for
# tool invocations) and to api.anthropic.com (for LLM inference).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
