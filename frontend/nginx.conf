server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — any path that doesn't map to a real file falls back to
    # index.html so the React Router can render the route client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the entry HTML — old clients picking up a stale index.html
    # after a deploy will keep pointing at hashed assets that no longer exist.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
